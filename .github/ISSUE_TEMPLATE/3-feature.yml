name: "Feature Request"
description: "New feature or improvement"
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
